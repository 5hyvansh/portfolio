<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shyvansh Portfolio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(180deg,#0b0b0b,#24160f,#0b0b0b);
color:white;
text-align:center;
padding:40px 15px;
}

h1{
font-size:42px;
font-weight:900;
margin-bottom:8px;
}

.subtitle{
color:#cfcfcf;
font-size:18px;
margin-bottom:50px;
}

.work-title{
font-size:34px;
font-weight:900;
color:silver;
margin-bottom:35px;
text-shadow:0 0 15px rgba(255,255,255,0.25);
letter-spacing:2px;
}

.gallery{
display:flex;
flex-direction:column;
align-items:center;
gap:28px;
}

.thumb{
width:92%;
max-width:900px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.6);
opacity:0;
transform:translateY(60px);
animation:fadeUp .8s ease forwards;
}

.thumb:nth-child(1){animation-delay:.2s;}
.thumb:nth-child(2){animation-delay:.5s;}
.thumb:nth-child(3){animation-delay:.8s;}
.thumb:nth-child(4){animation-delay:1.1s;}
.thumb:nth-child(5){animation-delay:1.4s;}
.thumb:nth-child(6){animation-delay:1.7s;}
.thumb:nth-child(7){animation-delay:2s;}
.thumb:nth-child(8){animation-delay:2.3s;}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

.contact{
margin-top:70px;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
padding-bottom:40px;
}

.btn{
width:280px;
padding:16px;
border-radius:14px;
text-decoration:none;
font-size:18px;
font-weight:bold;
color:white;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
transition:0.25s;
}

.btn:hover{
transform:scale(1.05);
}

.discord{
background:#5865F2;
box-shadow:0 0 20px rgba(88,101,242,.4);
}

.email{
background:#ff6b6b;
box-shadow:0 0 20px rgba(255,107,107,.4);
}

.footer{
margin-top:25px;
color:#9e9e9e;
font-size:14px;
}
</style>
</head>

<body>
