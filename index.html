<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shyvansh · Anime Intro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ───────────── RESET & BASE ───────────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0808;
            --text-primary: #f5ede8;
            --accent: #b8846a;
            --accent-glow: rgba(184, 132, 106, 0.25);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
            background: #0a0808;
        }

        /* ───────────── LANDING SCREEN ───────────── */
        #landing {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0808;
            will-change: transform, opacity;
            transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #landing.exit {
            opacity: 0;
            transform: scale(1.05) translateY(-12px);
            pointer-events: none;
        }

        /* ── Video Background ── */
        .landing-video-wrap {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        .landing-video-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(0.5) saturate(0.9) contrast(1.2);
            will-change: transform;
        }

        .landing-video-wrap .overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(180, 40, 40, 0.2) 0%, rgba(10, 8, 8, 0.7) 60%, rgba(10, 8, 8, 0.9) 100%),
                radial-gradient(ellipse at 70% 80%, rgba(200, 50, 50, 0.1) 0%, transparent 60%);
            mix-blend-mode: multiply;
        }

        .landing-video-wrap .vignette {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.6) 100%);
        }

        /* fallback gradient if video fails */
        .fallback-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            background: linear-gradient(145deg, #0a0808 0%, #1a0505 30%, #2d0a0a 60%, #0a0808 100%);
            background-size: 400% 400%;
            animation: gradShift 14s ease-in-out infinite;
        }

        @keyframes gradShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        /* ── Particle Canvas ── */
        #particleCanvas {
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── Glitch Text ── */
        .glitch-wrapper {
            position: relative;
            z-index: 4;
            text-align: center;
            padding: 24px;
            max-width: 720px;
            width: 100%;
            animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
        }

        .glitch-title {
            font-size: clamp(3.2rem, 13vw, 7rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 20px rgba(180, 40, 40, 0.4), 0 0 60px rgba(180, 40, 40, 0.2);
            letter-spacing: 2px;
            line-height: 1.05;
            position: relative;
            display: inline-block;
            animation: glitch 3s infinite;
        }

        .glitch-title .highlight {
            background: linear-gradient(135deg, #ff4d4d, #b8846a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Glitch keyframes */
        @keyframes glitch {
            0%,
            100% {
                transform: skew(0deg, 0deg);
                opacity: 1;
            }
            2% {
                transform: skew(2deg, -1deg) scale(1.01);
                text-shadow: 3px 0 red, -3px 0 cyan;
            }
            4% {
                transform: skew(-2deg, 1deg) scale(0.99);
                text-shadow: -3px 0 red, 3px 0 cyan;
            }
            6% {
                transform: skew(0deg, 0deg) scale(1);
                text-shadow: none;
            }
            8% {
                transform: skew(1deg, 0.5deg);
                text-shadow: 2px 0 #ff4d4d, -2px 0 #4d4dff;
            }
            10% {
                transform: skew(0deg, 0deg);
                text-shadow: none;
            }
        }

        /* Additional glitch layer for more effect */
        .glitch-title::before,
        .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .glitch-title::before {
            color: #ff4d4d;
            animation: glitchBefore 3s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
        }

        .glitch-title::after {
            color: #4d4dff;
            animation: glitchAfter 3s infinite;
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
        }

        @keyframes glitchBefore {
            0%,
            100% {
                transform: translate(0);
            }
            2% {
                transform: translate(-4px, 2px);
            }
            4% {
                transform: translate(4px, -2px);
            }
            6% {
                transform: translate(0);
            }
            8% {
                transform: translate(-2px, 1px);
            }
            10% {
                transform: translate(0);
            }
        }

        @keyframes glitchAfter {
            0%,
            100% {
                transform: translate(0);
            }
            2% {
                transform: translate(3px, -1px);
            }
            4% {
                transform: translate(-3px, 1px);
            }
            6% {
                transform: translate(0);
            }
            8% {
                transform: translate(2px, -1px);
            }
            10% {
                transform: translate(0);
            }
        }

        .landing-sub {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: rgba(255, 255, 255, 0.7);
            margin-top: 8px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 400;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
        }

        .landing-divider {
            width: 80px;
            height: 2px;
            margin: 18px auto 0;
            background: linear-gradient(90deg, transparent, #ff4d4d, transparent);
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.3);
        }

        /* ── Enter Button ── */
        .landing-btn-wrap {
            margin-top: 44px;
            animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(28px) saturate(1.5);
            -webkit-backdrop-filter: blur(28px) saturate(1.5);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 40px rgba(180, 40, 40, 0.1);
            border-radius: 30px;
            padding: 20px 64px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 1.35rem;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
            will-change: transform, box-shadow, border-color, background;
            user-select: none;
            min-width: 210px;
        }

        .glass-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 30px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 50%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .glass-btn:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 60px rgba(255, 77, 77, 0.2);
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.08);
        }

        .glass-btn:active {
            transform: scale(0.96) translateY(0);
        }

        .glass-btn .arrow {
            display: inline-block;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }
        .glass-btn:hover .arrow {
            transform: translateX(8px);
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ───────────── RESPONSIVE ───────────── */
        @media (max-width: 640px) {
            .glass-btn {
                padding: 16px 36px;
                font-size: 1.15rem;
                min-width: 160px;
            }
            .glitch-title {
                font-size: clamp(2.4rem, 10vw, 3.6rem);
            }
            .landing-sub {
                font-size: 0.75rem;
                letter-spacing: 4px;
            }
            .landing-divider {
                width: 50px;
            }
        }

        @media (max-width: 400px) {
            .glitch-title {
                font-size: 2rem;
            }
            .glass-btn {
                padding: 14px 28px;
                font-size: 1rem;
                min-width: 130px;
            }
        }

        /* ───────────── MAIN WEBSITE (hidden until enter) ───────────── */
        #mainSite {
            display: none;
            width: 100%;
            min-height: 100vh;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Fredoka', sans-serif;
            padding: 40px 20px;
            text-align: center;
        }

        #mainSite.visible {
            display: block;
        }

        /* quick demo content */
        .demo-content {
            max-width: 600px;
            margin: 0 auto;
            padding-top: 80px;
        }
        .demo-content h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
        }
        .demo-content p {
            color: #ccc;
            margin: 20px 0;
        }
        .demo-content .btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px 40px;
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .demo-content .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <!-- ════════════════════════════════════════════ -->
    <!--  LANDING SCREEN  (full-screen video + particles + glitch) -->
    <!-- ════════════════════════════════════════════ -->
    <div id="landing" role="dialog" aria-label="Welcome to Shyvansh Portfolio">
        <!-- Fallback gradient -->
        <div class="fallback-bg"></div>

        <!-- Video background -->
        <div class="landing-video-wrap">
            <!--
            ── VIDEO SOURCE ──
            Replace 'your-video.mp4' with your own anime-style clip.
            Recommended: dark, cinematic, red/black tones.
            -->
            <video autoplay loop muted playsinline preload="metadata" poster="">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
                <!-- Fallback: gradient will show -->
            </video>
            <div class="overlay"></div>
            <div class="vignette"></div>
        </div>

        <!-- Particle canvas -->
        <canvas id="particleCanvas"></canvas>

        <!-- Content -->
        <div class="glitch-wrapper">
            <h1 class="glitch-title" data-text="SHYVANSH">
                SHYVANSH
            </h1>
            <p class="landing-sub">Thumbnail Artist · Visual Storyteller</p>
            <div class="landing-divider"></div>
            <div class="landing-btn-wrap">
                <button class="glass-btn" id="enterBtn" aria-label="Enter portfolio">
                    Enter
                    <span class="arrow">→</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════════ -->
    <!--  MAIN SITE (hidden until enter)             -->
    <!-- ════════════════════════════════════════════ -->
    <div id="mainSite">
        <div class="demo-content">
            <h1>Welcome to Shyvansh's World</h1>
            <p>This is your main portfolio website. You can replace this content with your own pages, like About, Portfolio, etc.</p>
            <a href="#" class="btn">Explore</a>
        </div>
    </div>

    <!-- ════════════════════════════════════════════ -->
    <!--  JAVASCRIPT  (particles + transition)       -->
    <!-- ════════════════════════════════════════════ -->
    <script>
        (function() {
            'use strict';

            // ── DOM refs ──
            const landing = document.getElementById('landing');
            const enterBtn = document.getElementById('enterBtn');
            const mainSite = document.getElementById('mainSite');
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');

            // ── Particle System ──
            let particles = [];
            const PARTICLE_COUNT = 140;
            let width, height;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            class Particle {
                constructor() {
                    this.reset();
                }

                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 2.5 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 1.2;
                    this.speedY = (Math.random() - 0.5) * 1.2;
                    this.opacity = Math.random() * 0.6 + 0.2;
                    this.hue = Math.random() > 0.7 ? 0 : 10; // 0 = red, 10 = orange-ish
                    this.sat = Math.random() > 0.5 ? 80 : 60;
                    this.light = Math.random() * 30 + 40;
                }

                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;

                    // wrap around
                    if (this.x < 0) this.x = width;
                    if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height;
                    if (this.y > height) this.y = 0;

                    // slight random drift
                    this.speedX += (Math.random() - 0.5) * 0.02;
                    this.speedY += (Math.random() - 0.5) * 0.02;
                    // clamp speed
                    const maxSpeed = 1.8;
                    const spd = Math.hypot(this.speedX, this.speedY);
                    if (spd > maxSpeed) {
                        this.speedX = (this.speedX / spd) * maxSpeed;
                        this.speedY = (this.speedY / spd) * maxSpeed;
                    }
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.light}%, ${this.opacity})`;
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(new Particle());
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animateParticles);
            }

            // ── Handle resize ──
            window.addEventListener('resize', () => {
                resizeCanvas();
                // reassign particles to new bounds
                particles.forEach(p => {
                    p.x = Math.min(p.x, width);
                    p.y = Math.min(p.y, height);
                });
            });

            // ── Start particles ──
            resizeCanvas();
            initParticles();
            animateParticles();

            // ── Enter button transition ──
            enterBtn.addEventListener('click', function() {
                landing.classList.add('exit');
                setTimeout(() => {
                    landing.style.display = 'none';
                    mainSite.classList.add('visible');
                    // stop particle animation to save resources
                    // (we can't easily stop requestAnimationFrame, but we can let it continue in background)
                    // we'll clear the canvas and stop drawing by setting a flag
                    // Actually we can keep it running but it's invisible, that's fine.
                    // To be cleaner, we could cancelAnimationFrame, but we'll just let it run.
                    // But we can reduce overhead by not drawing if not visible.
                    // We'll just let it run, it's lightweight.
                }, 900);
            });

            // ── Keyboard shortcut: Enter key ──
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !landing.classList.contains('exit')) {
                    enterBtn.click();
                }
            });

            // ── Preload video ──
            const vid = document.querySelector('.landing-video-wrap video');
            if (vid) {
                vid.addEventListener('loadeddata', () => {
                    vid.play().catch(() => {});
                });
                vid.play().catch(() => {});
            }

            console.log('🔥 Anime intro loaded · Particles active · Glitch effect ready');

        })();
    </script>

</body>
</html>
