<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Shyvansh Portfolio</title><link href="https://fonts.googleapis.com/css2?family=Rye&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:linear-gradient(180deg,#0b0b0b,#24160f,#0b0b0b);
font-family:'Fredoka',sans-serif;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.logo{
width:220px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
animation:fadeUp 1s ease;
}

.title{
font-family:'Rye',cursive;
font-size:65px;
color:#FFD700;
margin-top:20px;
letter-spacing:3px;
animation:fadeUp 1.2s ease;
}

.subtitle{
font-size:20px;
margin-top:10px;
color:white;
animation:fadeUp 1.4s ease;
}

.buttons{
margin-top:40px;
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
animation:fadeUp 1.6s ease;
}

.nav-btn{
background:white;
color:black;
text-decoration:none;
padding:15px 35px;
border-radius:18px;
font-weight:700;
transition:.3s;
}

.nav-btn:hover{
transform:translateY(-5px) scale(1.05);
}

/* SECTIONS */

.section{
padding:80px 20px;
max-width:1000px;
margin:auto;
}

.section-title{
text-align:center;
font-size:36px;
font-weight:700;
color:silver;
margin-bottom:40px;
}

.card{
width:100%;
display:block;
margin-bottom:25px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
animation:fadeUp 1s ease;
}

/* CONTACT */

.contact-buttons{
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

.contact-btn{
width:280px;
background:white;
color:black;
text-decoration:none;
padding:16px;
border-radius:18px;
font-weight:700;
text-align:center;
transition:.3s;
}

.contact-btn:hover{
transform:translateY(-5px) scale(1.05);
}

.discord{
border:3px solid #5865F2;
}

.email{
border:3px solid #ff5c5c;
}

.footer{
text-align:center;
padding:30px;
color:#999;
}

/* ANIMATION */

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style></head><body><section class="hero"><img class="logo" src="Untitled163_20260610180749.jpg"><h1 class="title">SHYVANSH</h1><p class="subtitle">A Graphic Designer</p><div class="buttons">
<a href="#pfp" class="nav-btn">PFP</a>
<a href="#thumbs" class="nav-btn">THUMBNAILS</a>
</div></section><section id="pfp" class="section"><h2 class="section-title">PFP</h2><img class="card" src="Untitled163_20260610180749.jpg"></section><section id="thumbs" class="section"><h2 class="section-title">THUMBNAILS</h2><img class="card" src="Untitled156_20260609072400.png">

<img class="card" src="Untitled159_20260609073317.png">
<img class="card" src="Untitled160_20260609073519.png">
<img class="card" src="Untitled161_20260609074039.png">
<img class="card" src="Untitled162_20260609074220.png"></section><section class="section"><h2 class="section-title">CONTACT</h2><div class="contact-buttons"><a class="contact-btn discord"
href="https://discord.gg/2ZRDMKRTNy"
target="_blank">
Discord Server
</a>

<a class="contact-btn email"

</a>
