<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - SHYVANSH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container home-page">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <button class="glass-button back-btn" onclick="goBack()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <button class="glass-button theme-toggle" id="themeToggle" onclick="toggleTheme()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </nav>

        <!-- Background -->
        <div class="home-background"></div>

        <!-- Content -->
        <div class="home-content">
            <div class="cards-container">
                <!-- About Card -->
                <div class="glass-card fade-up-animate" onclick="navigateTo('about.html')" style="animation-delay: 0.2s;">
                    <div class="card-content">
                        <h2>About Shyvansh</h2>
                        <p>Learn more about my journey and expertise</p>
                    </div>
                    <div class="card-icon">→</div>
                    <div class="glass-glow"></div>
                </div>

                <!-- Portfolio Card -->
                <div class="glass-card fade-up-animate" onclick="navigateTo('portfolio.html')" style="animation-delay: 0.4s;">
                    <div class="card-content">
                        <h2>Portfolio</h2>
                        <p>Explore my Minecraft thumbnails & creative work</p>
                    </div>
                    <div class="card-icon">→</div>
                    <div class="glass-glow"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
